name: Platform CI

on:
  push:
    branches: [main]
    paths:
      - "platform/**"
      - "server/**"
      - ".github/workflows/platform-ci.yml"
  pull_request:
    branches: [main]

jobs:
  lint-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx tsc --noEmit

  lint-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd server && npm ci

  build-api-gateway:
    runs-on: ubuntu-latest
    needs: [lint-server]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: platform/infrastructure/docker/Dockerfile.api-gateway
          push: false
          tags: flipwi/maps-api-gateway:${{ github.sha }}

  schema-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: flipwi
          POSTGRES_PASSWORD: flipwi
          POSTGRES_DB: flipwi_maps
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get install -y postgresql-client
          export PGPASSWORD=flipwi
          for f in platform/schemas/postgis/*.sql; do
            psql -h localhost -U flipwi -d flipwi_maps -f "$f"
          done
