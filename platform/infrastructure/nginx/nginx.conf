# Flipwi Maps — NGINX reverse proxy (self-hosted only)

upstream api_gateway {
    server api-gateway:3001;
}

upstream pelias_api {
    server pelias-api:4000;
}

upstream valhalla_api {
    server valhalla:8002;
}

upstream martin_tiles {
    server martin:3000;
}

server {
    listen 80;
    server_name api.maps.flipwi.local;
    client_max_body_size 10m;

    location / {
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 80;
    server_name search.maps.flipwi.local geocoder.maps.flipwi.local;

    location / {
        proxy_pass http://pelias_api;
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    server_name routing.maps.flipwi.local;

    location / {
        proxy_pass http://valhalla_api;
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    server_name tiles.maps.flipwi.local;

    location / {
        proxy_pass http://martin_tiles;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }
}

server {
    listen 80;
    server_name maps.maps.flipwi.local;

    location /styles/ {
        proxy_pass http://api_gateway/styles/;
    }

    location / {
        return 302 /styles/flipwi-streets.json;
    }
}
